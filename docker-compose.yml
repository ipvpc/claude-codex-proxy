# OpenAI proxy vars + Claude Code / Agent SDK vars are loaded from .env (see .env.example).
services:
  codex-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-codex-proxy:latest
    container_name: codex-service
    env_file:
      - path: .env
        required: false
    environment:
      CLI_SERVICE_PORT: ${CLI_SERVICE_PORT:-8110}
      # codex = OpenAI/Codex HTTP proxy | claude = Claude Code CLI/SDK (proxy routes return 503)
      CLI_SERVICE_MODE: ${CLI_SERVICE_MODE:-codex}
    ports:
      - "${CLI_SERVICE_PORT:-8110}:${CLI_SERVICE_PORT:-8110}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; p=os.environ.get('CLI_SERVICE_PORT','8110'); urllib.request.urlopen(f'http://127.0.0.1:{p}/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
