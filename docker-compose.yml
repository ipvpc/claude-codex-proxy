# Clients use the active CLI (codex app-server or claude remote-control), not OpenAI/Anthropic API keys.
services:
  codex-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-codex-proxy:latest
    container_name: codex-service
    env_file:
      - path: .env
        required: false
    environment:
      CLI_SERVICE_PORT: ${CLI_SERVICE_PORT:-8110}
      CLI_SERVICE_MODE: ${CLI_SERVICE_MODE:-codex}
      CLI_SERVICE_SESSION_NAME: ${CLI_SERVICE_SESSION_NAME:-claude-codex-proxy}
      CODEX_APP_SERVER_LISTEN: ${CODEX_APP_SERVER_LISTEN:-}
      CLI_WS_AUTH_TOKEN: ${CLI_WS_AUTH_TOKEN:-}
      CLI_WS_AUTH_TOKEN_FILE: ${CLI_WS_AUTH_TOKEN_FILE:-}
      CLI_REMOTE_CONTROL_SPAWN: ${CLI_REMOTE_CONTROL_SPAWN:-}
      CLI_REMOTE_CONTROL_VERBOSE: ${CLI_REMOTE_CONTROL_VERBOSE:-}
    volumes:
      - codex_home:/root/.codex
      - claude_home:/root/.claude
    ports:
      - "${CLI_SERVICE_PORT:-8110}:${CLI_SERVICE_PORT:-8110}"
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  codex_home:
  claude_home:
